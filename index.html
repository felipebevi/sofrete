<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SoFrete.com.br | Portal de ajuda ao caminhoneiro</title>
    <meta name="description" content="SoFrete - Portal focado na ajuda ao caminhoneiro. Em breve no ar.">
    <meta name="keywords" content="SoFrete, caminhoneiro, frete, transporte rodoviario, logistica, gestao de frota">
    <meta name="author" content="SoFrete">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0d2540">
    <link rel="canonical" href="https://sofrete.com.br/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sofrete.com.br/">
    <meta property="og:title" content="SoFrete.com.br | Portal de ajuda ao caminhoneiro">
    <meta property="og:description" content="Portal focado na ajuda ao caminhoneiro. Em breve no ar.">
    <meta property="og:image" content="https://sofrete.com.br/logo.png">

    <link rel="icon" type="image/png" href="logo.png">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: #0d2540;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overscroll-behavior: none;
        }

        /* Camada de fundo: fixa, cobre SEMPRE a viewport inteira.
           Inclui a foto + um degrade escuro por cima (contraste do card). */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #0d2540;
            background-image:
                linear-gradient(rgba(6, 18, 33, 0.55), rgba(6, 18, 33, 0.55)),
                url('background.png');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.92);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
            padding: 52px 40px;
            text-align: center;
        }

        .card .logo {
            display: block;
            width: 100%;
            max-width: 300px;
            height: auto;
            margin: 0 auto 30px;
        }

        .card .frase {
            font-size: 1.18rem;
            line-height: 1.55;
            color: #16334d;
            font-weight: 500;
            margin-bottom: 28px;
        }

        .card .badge {
            display: inline-block;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(135deg, #2b8fe0, #0d4f8b);
            padding: 11px 30px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(13, 79, 139, 0.35);
        }

        @media (max-width: 600px) {
            .card { padding: 40px 26px; border-radius: 20px; }
            .card .frase { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="bg" aria-hidden="true"></div>

    <main class="card">
        <img class="logo" src="logo.png" alt="SoFrete.com.br - Portal de ajuda ao caminhoneiro">
        <p class="frase">Portal focado na ajuda ao caminhoneiro.</p>
        <span class="badge">Em breve</span>
    </main>

</body>
</html>
