<head>

    <!-- ========================================== -->
    <!-- CONFIGURAÇÕES DE SEO                       -->
    <!-- ========================================== -->
    <title>SoFrete.com.br | Centro de Cuidado e Gestão do Caminhoneiro</title>
    <meta name="description" content="Em breve no ar! O SoFrete é o seu novo portal para cuidado, saúde, gestão de fretes, controle financeiro e manutenção do seu caminhão. Aguarde novidades.">
    <meta name="keywords" content="SoFrete, caminhoneiro, frete, transporte rodoviário, gestão de frota, manutenção de caminhão, saúde do motorista, logística, telemedicina">
    <meta name="author" content="SoFrete">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Para redes sociais como WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.sofrete.com.br/">
    <meta property="og:title" content="SoFrete.com.br | O Centro de Cuidado do Caminhoneiro">
    <meta property="og:description" content="Um novo portal focado na saúde do caminhoneiro, gestão financeira de fretes e manutenção preventiva está chegando.">
    <meta property="og:image" content="3996641183825636020.jpeg">

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #1a1a1a; 
        }

        /* Container principal com a imagem Desktop (padrão) */
        .coming-soon-bg {
            background-image: url('3996641183825636020.jpeg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover; 
            height: 100vh;
            width: 100%;
        }

        /* ========================================== */
        /* RESPONSIVIDADE PARA MOBILE                 */
        /* ========================================== */
        /* Se a tela for menor que 768px (celulares), troca a imagem de fundo */
        @media (max-width: 768px) {
            .coming-soon-bg {
                background-image: url('3996641183825636022.png');
            }
        }

        /* Classe para esconder textos visualmente, mas manter para o Googlebot (SEO) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <main class="coming-soon-bg">
        <!-- Textos estruturados para o Google entender do que se trata o seu site -->
        <h1 class="sr-only">SoFrete.com.br - Um novo portal está chegando</h1>
        <h2 class="sr-only">Cuidado e Bem-estar do Caminhoneiro, Gestão Financeira, Contas do Frete, Manutenção do Caminhão e Apoio Pós-contratação.</h2>
        <p class="sr-only">Soluções completas para você e seu caminhão. Em breve no ar. Aguarde novidades!</p>
    </main>

</body>
</html>
